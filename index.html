<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU 100 // MIDTERM PREP</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090b;--surface:#111113;--surface2:#18181b;--surface3:#1e1e22;
  --border:#27272a;--border-hi:#3f3f46;
  --dim:#52525b;--text:#a1a1aa;--bright:#e4e4e7;--white:#fafafa;
  --accent:#4ade80;--accent-dim:#166534;--error:#f87171;--error-dim:#7f1d1d;
  --glow:rgba(74,222,128,0.08);--glow-strong:rgba(74,222,128,0.15);
  --font:'JetBrains Mono','Fira Code','Consolas','Courier New',monospace;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
html{font-size:15px;scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;line-height:1.6;overflow-x:hidden;
  background-image:
    linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:40px 40px;
}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}

.scanline{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}

#app{max-width:960px;margin:0 auto;padding:1.5rem 1.5rem 4rem}

/* HEADER */
.header{
  border-bottom:1px solid var(--border);padding-bottom:1rem;margin-bottom:1.5rem;
  display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem;
}
.header h1{
  font-size:1.4rem;font-weight:700;color:var(--white);letter-spacing:2px;
}
.header h1 span{color:var(--accent);font-weight:300}
.header .sub{font-size:.7rem;color:var(--dim);letter-spacing:3px;text-transform:uppercase}
.stats{display:flex;gap:1.5rem;font-size:.7rem;color:var(--dim)}
.stats b{color:var(--text)}

/* NAV */
.nav{
  display:flex;gap:2px;margin-bottom:2rem;background:var(--surface);
  border:1px solid var(--border);border-radius:4px;overflow:hidden;
}
.nav button{
  flex:1;padding:.7rem .5rem;background:transparent;border:none;
  font-family:var(--font);font-size:.75rem;color:var(--dim);cursor:pointer;
  letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;position:relative;
}
.nav button:hover{color:var(--text);background:var(--surface2)}
.nav button.active{color:var(--accent);background:var(--surface2)}
.nav button.active::after{
  content:'';position:absolute;bottom:0;left:10%;width:80%;height:2px;
  background:var(--accent);box-shadow:0 0 8px var(--glow-strong);
}

/* CARDS */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:4px;
  margin-bottom:.75rem;overflow:hidden;transition:border-color .2s;
}
.card:hover{border-color:var(--border-hi)}
.card-head{
  padding:1rem 1.25rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  user-select:none;transition:background .2s;
}
.card-head:hover{background:var(--surface2)}
.card-head h2{font-size:.85rem;font-weight:500;color:var(--bright);letter-spacing:1px}
.card-head .period{font-size:.7rem;color:var(--dim);letter-spacing:2px}
.card-head .arrow{color:var(--dim);transition:transform .3s var(--ease);font-size:.8rem}
.card.open .card-head .arrow{transform:rotate(90deg)}
.card-body{
  max-height:0;overflow:hidden;transition:max-height .5s var(--ease);
}
.card.open .card-body{max-height:5000px}
.card-content{padding:0 1.25rem 1.25rem;border-top:1px solid var(--border)}
.card-content h3{
  font-size:.72rem;font-weight:700;color:var(--accent);letter-spacing:2px;
  text-transform:uppercase;margin:1.25rem 0 .6rem;
}
.card-content h3:first-child{margin-top:.75rem}
.card-content p{font-size:.82rem;margin-bottom:.5rem;color:var(--text)}
.card-content ul{list-style:none;padding:0}
.card-content li{
  font-size:.82rem;padding:.3rem 0 .3rem 1rem;position:relative;color:var(--text);
}
.card-content li::before{
  content:'>';position:absolute;left:0;color:var(--dim);font-weight:700;
}
.composer{
  padding:.6rem .8rem;background:var(--surface2);border:1px solid var(--border);
  border-radius:3px;margin-bottom:.5rem;
}
.composer .name{font-size:.8rem;font-weight:600;color:var(--bright)}
.composer .desc{font-size:.78rem;color:var(--text);margin-top:.2rem}

/* FLASHCARDS */
.fc-container{text-align:center}
.fc-progress{font-size:.7rem;color:var(--dim);letter-spacing:2px;margin-bottom:1rem}
.fc-progress b{color:var(--text)}
.fc-bar{
  height:3px;background:var(--surface2);border-radius:2px;margin-bottom:1.5rem;overflow:hidden;
}
.fc-bar-fill{height:100%;background:var(--accent);transition:width .4s var(--ease);border-radius:2px}
.fc-card-wrap{perspective:800px;margin:0 auto 1.5rem;max-width:560px;height:260px;cursor:pointer}
.fc-card{
  width:100%;height:100%;position:relative;transform-style:preserve-3d;
  transition:transform .5s var(--ease);
}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{
  position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;text-align:center;
}
.fc-face.back{transform:rotateY(180deg);background:var(--surface2);border-color:var(--accent-dim)}
.fc-label{
  font-size:.6rem;color:var(--dim);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:.75rem;
}
.fc-text{font-size:.9rem;color:var(--bright);line-height:1.7}
.fc-back-text{font-size:.85rem;color:var(--text);line-height:1.7}
.fc-hint{font-size:.65rem;color:var(--dim);margin-top:auto;letter-spacing:1px}
.fc-controls{display:flex;gap:.75rem;justify-content:center;align-items:center;flex-wrap:wrap}
.fc-btn{
  padding:.6rem 1.2rem;background:var(--surface2);border:1px solid var(--border);
  border-radius:3px;font-family:var(--font);font-size:.75rem;color:var(--text);
  cursor:pointer;letter-spacing:1px;transition:all .15s;
}
.fc-btn:hover{border-color:var(--border-hi);color:var(--bright);background:var(--surface3)}
.fc-btn.accent{border-color:var(--accent-dim);color:var(--accent)}
.fc-btn.accent:hover{background:var(--accent-dim);border-color:var(--accent)}
.fc-filter{
  display:flex;gap:2px;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap;
}
.fc-filter button{
  padding:.4rem .8rem;background:transparent;border:1px solid var(--border);
  border-radius:3px;font-family:var(--font);font-size:.65rem;color:var(--dim);
  cursor:pointer;letter-spacing:1px;transition:all .15s;
}
.fc-filter button:hover{color:var(--text);border-color:var(--border-hi)}
.fc-filter button.active{color:var(--accent);border-color:var(--accent-dim);background:rgba(74,222,128,.05)}

/* QUIZ */
.quiz-intro{text-align:center;padding:3rem 1rem}
.quiz-intro h2{font-size:1.1rem;color:var(--bright);margin-bottom:.5rem}
.quiz-intro p{font-size:.82rem;color:var(--text);margin-bottom:1.5rem}
.quiz-start-btn{
  padding:.8rem 2rem;background:var(--accent-dim);border:1px solid var(--accent);
  border-radius:4px;font-family:var(--font);font-size:.82rem;color:var(--accent);
  cursor:pointer;letter-spacing:1px;transition:all .15s;
}
.quiz-start-btn:hover{background:var(--accent);color:var(--bg)}
.quiz-q{margin-bottom:2rem}
.quiz-meta{
  display:flex;justify-content:space-between;align-items:center;
  font-size:.7rem;color:var(--dim);letter-spacing:1px;margin-bottom:.75rem;
}
.quiz-meta .era-tag{
  padding:.15rem .5rem;background:var(--surface2);border:1px solid var(--border);
  border-radius:2px;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;
}
.quiz-question{font-size:.92rem;color:var(--bright);margin-bottom:1.25rem;line-height:1.6}
.quiz-options{display:flex;flex-direction:column;gap:.5rem}
.quiz-opt{
  padding:.75rem 1rem;background:var(--surface);border:1px solid var(--border);
  border-radius:4px;font-family:var(--font);font-size:.82rem;color:var(--text);
  cursor:pointer;text-align:left;transition:all .15s;display:flex;gap:.75rem;
}
.quiz-opt:hover:not(.locked){border-color:var(--border-hi);color:var(--bright);background:var(--surface2)}
.quiz-opt .key{
  color:var(--dim);font-weight:700;flex-shrink:0;width:1.2rem;
}
.quiz-opt.correct{border-color:var(--accent);background:rgba(74,222,128,.08);color:var(--accent)}
.quiz-opt.wrong{border-color:var(--error);background:rgba(248,113,113,.08);color:var(--error)}
.quiz-opt.locked{cursor:default}
.quiz-next{
  margin-top:1.5rem;text-align:right;
}
.quiz-next button{
  padding:.6rem 1.5rem;background:var(--surface2);border:1px solid var(--border);
  border-radius:3px;font-family:var(--font);font-size:.75rem;color:var(--text);
  cursor:pointer;letter-spacing:1px;transition:all .15s;
}
.quiz-next button:hover{border-color:var(--border-hi);color:var(--bright)}
.quiz-result{text-align:center;padding:2rem 1rem}
.quiz-result h2{font-size:1.2rem;color:var(--bright);margin-bottom:.5rem}
.quiz-score{font-size:2.5rem;font-weight:700;color:var(--accent);margin:1rem 0}
.quiz-score.low{color:var(--error)}
.quiz-score.mid{color:var(--text)}
.quiz-breakdown{
  display:flex;justify-content:center;gap:2rem;margin:1.5rem 0;
  font-size:.8rem;color:var(--dim);
}
.quiz-breakdown b{display:block;font-size:1.1rem;margin-bottom:.2rem}
.quiz-breakdown .right b{color:var(--accent)}
.quiz-breakdown .wrong b{color:var(--error)}
.quiz-review-list{text-align:left;margin:2rem 0}
.quiz-review-item{
  padding:.75rem 1rem;background:var(--surface);border:1px solid var(--border);
  border-radius:4px;margin-bottom:.5rem;font-size:.8rem;
}
.quiz-review-item .q{color:var(--bright);margin-bottom:.3rem}
.quiz-review-item .your-ans{color:var(--error)}
.quiz-review-item .correct-ans{color:var(--accent)}

/* TIMELINE */
.timeline-wrap{overflow-x:auto;padding:2rem 0}
.timeline{
  display:flex;position:relative;min-width:max-content;padding:0 2rem;
}
.timeline::before{
  content:'';position:absolute;top:50%;left:0;right:0;height:2px;
  background:var(--border);transform:translateY(-50%);
}
.tl-era{
  flex-shrink:0;width:220px;padding:0 .5rem;position:relative;
}
.tl-era-label{
  position:relative;background:var(--surface);border:1px solid var(--border);
  border-radius:4px;padding:.6rem .8rem;text-align:center;z-index:2;
  margin-bottom:.3rem;
}
.tl-era-label h3{font-size:.75rem;color:var(--bright);letter-spacing:1px;font-weight:600}
.tl-era-label .dates{font-size:.6rem;color:var(--dim);letter-spacing:2px;margin-top:.15rem}
.tl-dot{
  width:10px;height:10px;background:var(--accent);border-radius:50%;
  margin:0 auto .3rem;position:relative;z-index:2;
  box-shadow:0 0 8px var(--glow-strong);
}
.tl-composers{font-size:.7rem;color:var(--dim);text-align:center;line-height:1.8}
.tl-composers span{display:block;color:var(--text)}

/* KEYBOARD HINTS */
.kb-hints{
  position:fixed;bottom:1rem;right:1rem;font-size:.6rem;color:var(--dim);
  letter-spacing:1px;background:var(--surface);border:1px solid var(--border);
  padding:.4rem .6rem;border-radius:3px;z-index:100;
}
.kb-hints kbd{
  display:inline-block;padding:.1rem .35rem;background:var(--surface2);
  border:1px solid var(--border);border-radius:2px;font-family:var(--font);
  font-size:.58rem;color:var(--text);margin:0 .1rem;
}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s var(--ease) forwards;opacity:0}
.fade-in:nth-child(1){animation-delay:.05s}
.fade-in:nth-child(2){animation-delay:.1s}
.fade-in:nth-child(3){animation-delay:.15s}
.fade-in:nth-child(4){animation-delay:.2s}
.fade-in:nth-child(5){animation-delay:.25s}

@media(max-width:640px){
  html{font-size:14px}
  #app{padding:1rem}
  .header{flex-direction:column;align-items:flex-start}
  .fc-card-wrap{height:220px}
  .tl-era{width:180px}
}
</style>
</head>
<body>
<div class="scanline"></div>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════

const REVIEW = [
  {
    id:'medieval', title:'THE MIDDLE AGES', period:'450 — 1450',
    sections:[
      {title:'SOCIO-POLITICAL CONTEXT', html:`
        <p>Europe under the <b>feudal system</b> — rigid social hierarchy: king > nobles > knights > peasants. The <b>Catholic Church</b> was the most powerful institution, controlling education, art, and daily life. Nearly all literate people were clergy.</p>
        <p>Most music existed to serve the Church. <b>Monasteries and cathedrals</b> were the centers of musical life. Secular music existed but was rarely written down.</p>
      `},
      {title:'KEY MUSICAL CONCEPTS', html:`
        <ul>
          <li><b>Gregorian Chant</b> — the official music of the Roman Catholic Church. Monophonic (single melody line), sung in Latin, a cappella (no instruments), with free rhythm (no regular beat). Named after <b>Pope Gregory I</b>.</li>
          <li><b>Polyphony</b> — multiple independent melodic lines sounding simultaneously. The great innovation of this era.</li>
          <li><b>Organum</b> — the earliest form of polyphony: a second voice added to an existing Gregorian chant melody.</li>
          <li><b>Ars Nova</b> — "New Art" — a 14th-century movement featuring greater rhythmic complexity and new notation.</li>
          <li><b>Mass Ordinary</b> — the five sections with fixed texts: <b>Kyrie, Gloria, Credo, Sanctus, Agnus Dei</b>.</li>
        </ul>
      `},
      {title:'NOTATION & THEORY DEVELOPMENT', html:`
        <ul>
          <li><b>Neumes</b> — early musical notation symbols written above text. Showed melodic contour (up/down) but not exact pitch or rhythm. A huge step from pure oral tradition.</li>
          <li><b>Guido d'Arezzo (c. 991–1033)</b> — developed the <b>staff</b> (lines and spaces) and <b>solmization</b> (ut-re-mi-fa-sol-la) — the ancestor of modern do-re-mi. Revolutionized music education and transmission.</li>
          <li><b>Rhythmic Modes</b> (Notre Dame School) — first system of organizing rhythmic patterns, enabling coordination of multiple voices in polyphony.</li>
        </ul>
      `},
      {title:'SECULAR MUSIC', html:`
        <ul>
          <li><b>Troubadours</b> — poet-musicians of <b>southern France</b>. Sang secular songs, often about courtly love, in Occitan.</li>
          <li><b>Trouvères</b> — poet-musicians of <b>northern France</b>. Similar to troubadours but sang in Old French.</li>
          <li><b>Minstrels</b> — traveling performers who entertained in courts and public spaces.</li>
        </ul>
      `},
      {title:'KEY COMPOSERS', html:`
        <div class="composer"><span class="name">Hildegard of Bingen (1098–1179)</span><div class="desc">German nun, mystic, and composer. One of the first known composers by name. Wrote elaborate chants with unusually wide melodic ranges. Also a writer, philosopher, and scientist.</div></div>
        <div class="composer"><span class="name">Léonin (fl. late 12th c.)</span><div class="desc">Notre Dame School in Paris. Created early 2-voice organum. Compiled the <b>Magnus Liber Organi</b> (Great Book of Organum).</div></div>
        <div class="composer"><span class="name">Pérotin (fl. c. 1200)</span><div class="desc">Notre Dame School. Expanded organum to <b>3 and 4 voices</b>. Introduced <b>rhythmic modes</b> (organized rhythmic patterns).</div></div>
        <div class="composer"><span class="name">Guillaume de Machaut (c. 1300–1377)</span><div class="desc"><b>Ars Nova</b> master. Composed the first complete <b>polyphonic setting of the Mass Ordinary</b>: <i>Messe de Nostre Dame</i>. Also wrote secular songs.</div></div>
      `}
    ]
  },
  {
    id:'renaissance', title:'THE RENAISSANCE', period:'1450 — 1600',
    sections:[
      {title:'SOCIO-POLITICAL CONTEXT', html:`
        <p><b>Humanism</b> — a renewed interest in human experience, classical antiquity, and individual achievement. The <b>middle class</b> rises. Art and music are no longer exclusively for the Church.</p>
        <p>The <b>printing press</b> (Gutenberg, c. 1440) revolutionizes music distribution. For the first time, music can spread widely and affordably.</p>
        <p>Music shifts from being primarily a sacred activity to a valued secular art form as well.</p>
      `},
      {title:'SACRED MUSIC', html:`
        <ul>
          <li><b>Mass</b> — polyphonic settings of the five-part Mass Ordinary remain the most prestigious form of composition.</li>
          <li><b>Motet</b> — polyphonic choral work on a sacred Latin text, <b>not</b> part of the Mass liturgy. More flexible and expressive.</li>
          <li><b>Council of Trent (mid-16th c.)</b> — Catholic Church reforms during the Counter-Reformation demanded <b>text clarity</b> in sacred music. Excessive polyphonic complexity was criticized for obscuring the words.</li>
        </ul>
      `},
      {title:'SECULAR MUSIC', html:`
        <ul>
          <li><b>Madrigal</b> — secular vocal piece for multiple voices in the <b>vernacular</b> (Italian or English, not Latin). Heavy use of <b>word painting</b> (music mimics the text's meaning). Popular in Italy and England.</li>
          <li><b>Lute songs (Ayres)</b> — solo vocal music with lute accompaniment. More intimate than madrigals.</li>
          <li><b>Instrumental dance collections</b> — published sets of dances for ensemble performance.</li>
        </ul>
      `},
      {title:'THE VENETIAN SCHOOL', html:`
        <p>Based at <b>St. Mark's Basilica</b> in Venice. Pioneered <b>cori spezzati</b> ("split choirs") — placing multiple choirs in different locations in the church for an <b>antiphonal, stereo-like effect</b>. Also pioneered early use of written dynamic markings and prominent brass writing.</p>
      `},
      {title:'KEY COMPOSERS', html:`
        <div class="composer"><span class="name">Josquin des Prez (c. 1450–1521)</span><div class="desc">Master of Renaissance polyphony. Known for expressive <b>word painting</b> and emotional depth. Called "the master of the notes" — he made the notes serve the text.</div></div>
        <div class="composer"><span class="name">Giovanni Pierluigi da Palestrina (c. 1525–1594)</span><div class="desc">His smooth, balanced, consonant polyphony became the <b>model of "perfect" church music</b>. Directly linked to the <b>Council of Trent</b> reforms — his music proved polyphony could be clear.</div></div>
        <div class="composer"><span class="name">Thomas Tallis (c. 1505–1585)</span><div class="desc">English composer who served under <b>4 monarchs</b> (Henry VIII, Edward VI, Mary I, Elizabeth I). Wrote in both Latin and English. Famous for <b><i>Spem in Alium</i></b>, a motet for <b>40 voices</b>.</div></div>
        <div class="composer"><span class="name">John Dowland (1563–1626)</span><div class="desc">Master of the <b>lute song (ayre)</b>. Known for a <b>melancholic</b> style. Famous work: <i>"Flow My Tears."</i></div></div>
        <div class="composer"><span class="name">Michael Praetorius (1571–1621)</span><div class="desc">German composer and music theorist. Wrote <b><i>Syntagma Musicum</i></b> (a music encyclopedia) and <b><i>Terpsichore</i></b> (a collection of over 300 dances).</div></div>
        <div class="composer"><span class="name">Tielman Susato (c. 1510–1570)</span><div class="desc">Flemish music publisher and composer. Published <b><i>Danserye</i></b>, one of the first printed collections of instrumental dance music.</div></div>
        <div class="composer"><span class="name">Giovanni Gabrieli (c. 1557–1612)</span><div class="desc">Venetian School. Master of <b>cori spezzati</b> at St. Mark's Basilica. Among the first to write specific <b>dynamic markings</b> (piano/forte) in scores. Major brass writing.</div></div>
      `}
    ]
  },
  {
    id:'baroque', title:'THE BAROQUE PERIOD', period:'1600 — 1750',
    sections:[
      {title:'SOCIO-POLITICAL CONTEXT', html:`
        <p>The <b>Age of Absolutism</b> — powerful monarchs (Louis XIV of France) and the Church commission grand, opulent art. "Baroque" originally meant "misshapen pearl" — a criticism of the era's ornate excess.</p>
        <p><b>Visual art connections:</b> Bernini, Caravaggio, Rubens — dramatic, emotional, ornate, with strong contrasts of light/dark (chiaroscuro). Music mirrors this: dramatic, ornamental, with strong contrasts.</p>
      `},
      {title:'KEY MUSICAL CONCEPTS', html:`
        <ul>
          <li><b>Basso continuo</b> (figured bass) — the foundation of Baroque harmony. A bass line played by a low instrument (cello/bassoon) + chords realized by keyboard (harpsichord). Present in virtually all Baroque music.</li>
          <li><b>Tonality</b> — the system of major and minor keys fully established in this era.</li>
          <li><b>Terraced dynamics</b> — sudden shifts between loud and soft (no gradual crescendo/decrescendo).</li>
          <li><b>Ornamentation</b> — trills, turns, mordents, and other decorations added to melodies.</li>
          <li><b>Doctrine of Affections</b> — the idea that a single piece (or movement) should express one unified emotion throughout.</li>
        </ul>
      `},
      {title:'GENRES', html:`
        <ul>
          <li><b>Opera</b> — staged drama set to music. Born in Florence c. 1600 by the <b>Florentine Camerata</b> (trying to recreate Greek drama). Key parts: <b>recitative</b> (speech-like singing, advances plot), <b>aria</b> (lyrical emotional solo), <b>libretto</b> (the text/script).</li>
          <li><b>Baroque Orchestra</b> — strings + basso continuo at the core. Smaller and less standardized than the Classical orchestra.</li>
          <li><b>Chamber Cantata</b> — secular vocal work for small forces: arias + recitatives.</li>

  {era:'Classical',front:'What is antecedent/consequent phrasing?',back:'Balanced phrase pairs: the first phrase (antecedent) ends on an unstable half cadence (question), the second (consequent) resolves to the tonic (answer). A hallmark of Classical melody.'},
  {era:'Classical',front:'What is Neoclassical art?',back:'Art style emphasizing clarity, symmetry, geometric composition, and restrained emotion. Greco-Roman subjects, civic virtue themes. Parallels Classical music\'s emphasis on order and balance.'},

// STATE
// ═══════════════════════════════════════════
let mode = 'review';
let fcIndex = 0, fcFlipped = false, fcFilter = 'All', fcDeck = [...FLASHCARDS];
let quizActive = false, quizIndex = 0, quizScore = 0, quizAnswered = false, quizDeck = [], quizWrong = [];
let openCards = {};

const stored = JSON.parse(localStorage.getItem('mu100_stats')||'{}');
let stats = { quizzes: stored.quizzes||0, bestPct: stored.bestPct||0, cardsFlipped: stored.cardsFlipped||0 };
function saveStats(){ localStorage.setItem('mu100_stats', JSON.stringify(stats)); }

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(){
  const app = document.getElementById('app');
  app.innerHTML = renderHeader() + renderNav() + renderContent() + renderKBHints();
  bindEvents();
}

function renderHeader(){
  return `<div class="header">
    <div><h1>MU 100 <span>//</span> MIDTERM</h1><div class="sub">Dr. Hontz &mdash; Intro to Music Literature</div></div>
    <div class="stats">
      <div>Quizzes: <b>${stats.quizzes}</b></div>
      <div>Best: <b>${stats.bestPct}%</b></div>
      <div>Cards: <b>${stats.cardsFlipped}</b></div>
    </div>
  </div>`;
}

function renderNav(){
  const tabs = ['review','flashcards','quiz','timeline'];
  return `<div class="nav">${tabs.map(t =>
    `<button data-mode="${t}" class="${mode===t?'active':''}">${t}</button>`
  ).join('')}</div>`;
}

function renderContent(){
  if(mode==='review') return renderReview();
  if(mode==='flashcards') return renderFlashcards();
  if(mode==='quiz') return renderQuiz();
  if(mode==='timeline') return renderTimeline();
}

function renderReview(){
  return REVIEW.map((era,i) => {
    const isOpen = openCards[era.id];
    return `<div class="card ${isOpen?'open':''} fade-in" style="animation-delay:${i*0.06}s">
      <div class="card-head" data-card="${era.id}">
        <h2>${era.title} <span class="period">${era.period}</span></h2>
        <span class="arrow">&#9654;</span>
      </div>
      <div class="card-body"><div class="card-content">
        ${era.sections.map(s => `<h3>${s.title}</h3>${s.html}`).join('')}
      </div></div>
    </div>`;
  }).join('');
}

function renderFlashcards(){
  const eras = ['All','Medieval','Renaissance','Baroque','Classical','Beethoven'];
  const deck = fcFilter==='All' ? fcDeck : fcDeck.filter(c=>c.era===fcFilter);
  const card = deck[fcIndex] || deck[0];
  if(!card) return '<p style="text-align:center;color:var(--dim)">No cards in this category.</p>';
  const idx = Math.min(fcIndex, deck.length-1);
  const pct = ((idx+1)/deck.length*100).toFixed(0);

  return `<div class="fc-container">
    <div class="fc-filter">${eras.map(e =>
      `<button data-era="${e}" class="${fcFilter===e?'active':''}">${e}</button>`
    ).join('')}</div>
    <div class="fc-progress">Card <b>${idx+1}</b> of <b>${deck.length}</b></div>
    <div class="fc-bar"><div class="fc-bar-fill" style="width:${pct}%"></div></div>
    <div class="fc-card-wrap" id="fc-flip">
      <div class="fc-card ${fcFlipped?'flipped':''}">
        <div class="fc-face front">
          <div class="fc-label">${card.era}</div>
          <div class="fc-text">${card.front}</div>
          <div class="fc-hint">click or press space to flip</div>
        </div>
        <div class="fc-face back">
          <div class="fc-label">Answer</div>
          <div class="fc-back-text">${card.back}</div>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn" id="fc-prev">&larr; Prev</button>
      <button class="fc-btn accent" id="fc-shuffle">Shuffle</button>
      <button class="fc-btn" id="fc-next">Next &rarr;</button>
    </div>
  </div>`;
}

function renderQuiz(){
  if(!quizActive){
    return `<div class="quiz-intro fade-in">
      <h2>[QUIZ MODE]</h2>
      <p>${QUIZ.length} questions covering all eras.<br>Multiple choice. See your score at the end.</p>
      <button class="quiz-start-btn" id="quiz-start">BEGIN QUIZ</button>
    </div>`;
  }
  if(quizIndex >= quizDeck.length){
    const pct = Math.round(quizScore/quizDeck.length*100);
    const cls = pct>=80?'':pct>=60?'mid':'low';
    stats.quizzes++;
    if(pct>stats.bestPct) stats.bestPct = pct;
    saveStats();
    let wrongHtml = '';
    if(quizWrong.length){
      wrongHtml = `<div class="quiz-review-list"><h3 style="font-size:.75rem;color:var(--dim);letter-spacing:2px;margin-bottom:.75rem">REVIEW MISSED QUESTIONS</h3>
        ${quizWrong.map(w => `<div class="quiz-review-item">
          <div class="q">${w.q}</div>
          <div class="your-ans">Your answer: ${w.yours}</div>
          <div class="correct-ans">Correct: ${w.correct}</div>
        </div>`).join('')}
      </div>`;
    }
    return `<div class="quiz-result fade-in">
      <h2>RESULTS</h2>
      <div class="quiz-score ${cls}">${pct}%</div>
      <div class="quiz-breakdown">
        <div class="right"><b>${quizScore}</b>correct</div>
        <div class="wrong"><b>${quizDeck.length - quizScore}</b>missed</div>
      </div>
      ${wrongHtml}
      <button class="quiz-start-btn" id="quiz-restart" style="margin-top:1rem">TRY AGAIN</button>
    </div>`;
  }
  const qObj = quizDeck[quizIndex];
  return `<div class="quiz-q fade-in">
    <div class="quiz-meta">
      <span>Question ${quizIndex+1} / ${quizDeck.length}</span>
      <span class="era-tag">${qObj.era}</span>
    </div>
    <div class="quiz-question">${qObj.q}</div>
    <div class="quiz-options">
      ${qObj.shuffledOpts.map((opt,i) => {
        let cls = 'quiz-opt';
        if(quizAnswered){
          cls += ' locked';
          if(i === qObj.correctShuffled) cls += ' correct';
          if(qObj.userAnswer === i && i !== qObj.correctShuffled) cls += ' wrong';
        }
        return `<button class="${cls}" data-qi="${i}"><span class="key">${['A','B','C','D'][i]}</span>${opt}</button>`;
      }).join('')}
    </div>
    ${quizAnswered ? `<div class="quiz-next"><button id="quiz-next-btn">Next &rarr;</button></div>` : ''}
  </div>`;
}

function renderTimeline(){
  return `<div class="timeline-wrap"><div class="timeline">
    ${TIMELINE.map((t,i) => `<div class="tl-era fade-in" style="animation-delay:${i*0.1}s">
      <div class="tl-era-label"><h3>${t.era}</h3><div class="dates">${t.dates}</div></div>
      <div class="tl-dot"></div>
      <div class="tl-composers">${t.composers.map(c=>`<span>${c}</span>`).join('')}</div>
    </div>`).join('')}
  </div></div>`;
}

function renderKBHints(){
  if(mode==='flashcards') return `<div class="kb-hints"><kbd>&larr;</kbd><kbd>&rarr;</kbd> nav &nbsp; <kbd>Space</kbd> flip</div>`;
  if(mode==='quiz' && quizActive && quizIndex < quizDeck.length && !quizAnswered)
    return `<div class="kb-hints"><kbd>1</kbd><kbd>2</kbd><kbd>3</kbd><kbd>4</kbd> answer</div>`;
  return '';
}

// ═══════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════
function bindEvents(){
  // Nav
  document.querySelectorAll('.nav button').forEach(btn => {
    btn.addEventListener('click', () => { mode = btn.dataset.mode; fcFlipped = false; render(); });
  });
  // Review cards
  document.querySelectorAll('.card-head').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.card;
      openCards[id] = !openCards[id];
      render();
    });
  });
  // Flashcards
  const flipEl = document.getElementById('fc-flip');
  if(flipEl) flipEl.addEventListener('click', flipCard);
  const prevBtn = document.getElementById('fc-prev');
  const nextBtn = document.getElementById('fc-next');
  const shuffleBtn = document.getElementById('fc-shuffle');
  if(prevBtn) prevBtn.addEventListener('click', () => { fcFlipped=false; const deck=getFilteredDeck(); fcIndex=Math.max(0,fcIndex-1); render(); });
  if(nextBtn) nextBtn.addEventListener('click', () => { fcFlipped=false; const deck=getFilteredDeck(); fcIndex=Math.min(deck.length-1,fcIndex+1); render(); });
  if(shuffleBtn) shuffleBtn.addEventListener('click', () => { shuffleArray(fcDeck); fcIndex=0; fcFlipped=false; render(); });
  document.querySelectorAll('.fc-filter button').forEach(btn => {
    btn.addEventListener('click', () => { fcFilter=btn.dataset.era; fcIndex=0; fcFlipped=false; render(); });
  });
  // Quiz
  const startBtn = document.getElementById('quiz-start');
  if(startBtn) startBtn.addEventListener('click', startQuiz);
  const restartBtn = document.getElementById('quiz-restart');
  if(restartBtn) restartBtn.addEventListener('click', startQuiz);
  document.querySelectorAll('.quiz-opt:not(.locked)').forEach(btn => {
    btn.addEventListener('click', () => answerQuiz(parseInt(btn.dataset.qi)));
  });
  const nextQ = document.getElementById('quiz-next-btn');
  if(nextQ) nextQ.addEventListener('click', () => { quizIndex++; quizAnswered=false; render(); });
}

function flipCard(){
  fcFlipped = !fcFlipped;
  if(fcFlipped){ stats.cardsFlipped++; saveStats(); }
  render();
}

function getFilteredDeck(){
  return fcFilter==='All' ? fcDeck : fcDeck.filter(c=>c.era===fcFilter);
}

function startQuiz(){
  quizDeck = shuffleArray([...QUIZ]).slice(0, 25);
  quizDeck.forEach(q => {
    const indices = q.opts.map((_,i)=>i);
    shuffleArray(indices);
    q.shuffledOpts = indices.map(i=>q.opts[i]);
    q.correctShuffled = indices.indexOf(q.ans);
  });
  quizIndex=0; quizScore=0; quizAnswered=false; quizActive=true; quizWrong=[];
  render();
}

function answerQuiz(idx){
  if(quizAnswered) return;
  quizAnswered = true;
  const q = quizDeck[quizIndex];
  q.userAnswer = idx;
  if(idx === q.correctShuffled){
    quizScore++;
  } else {
    quizWrong.push({ q:q.q, yours:q.shuffledOpts[idx], correct:q.shuffledOpts[q.correctShuffled] });
  }
  render();
}

function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(mode==='flashcards'){
    if(e.code==='Space'||e.code==='Enter'){ e.preventDefault(); flipCard(); }
    if(e.code==='ArrowLeft'){ fcFlipped=false; const deck=getFilteredDeck(); fcIndex=Math.max(0,fcIndex-1); render(); }
    if(e.code==='ArrowRight'){ fcFlipped=false; const deck=getFilteredDeck(); fcIndex=Math.min(deck.length-1,fcIndex+1); render(); }
  }
  if(mode==='quiz' && quizActive && !quizAnswered && quizIndex < quizDeck.length){
    if(e.key==='1') answerQuiz(0);
    if(e.key==='2') answerQuiz(1);
    if(e.key==='3') answerQuiz(2);
    if(e.key==='4') answerQuiz(3);
  }
  if(mode==='quiz' && quizAnswered && (e.code==='Enter'||e.code==='Space'||e.code==='ArrowRight')){
    e.preventDefault(); quizIndex++; quizAnswered=false; render();
  }
});

// Initial render
render();
</script>
